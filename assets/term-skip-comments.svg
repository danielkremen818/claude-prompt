<text x="314.0" y="23.0" text-anchor="middle" font-size="11" fill="#c4a78f" letter-spacing="0.04em">claude — /claude-prompt:p skip-comments</text>
<text font-size="13" xml:space="preserve">
<tspan x="22" y="65"><tspan fill="#34d399" font-weight="700">&gt; </tspan><tspan fill="#f4b860">/claude-prompt:p rename the CTA to </tspan><tspan fill="#f472b6">&quot;Get started — it’s free&quot;</tspan><tspan fill="#f4b860"> everywhere</tspan></tspan>
<tspan x="22" y="84"> </tspan>
<tspan x="22" y="103"><tspan fill="#f4b860" font-weight="700">Optimized prompt:</tspan></tspan>
<tspan x="22" y="122"><tspan fill="#e7d8c9">Replace the call-to-action label across the app.</tspan></tspan>
<tspan x="22" y="141"><tspan fill="#d97757">• </tspan><tspan fill="#e7d8c9">Find every render of the CTA (button, hero, nav).</tspan></tspan>
<tspan x="22" y="160"><tspan fill="#d97757">• </tspan><tspan fill="#e7d8c9">Set the label to exactly </tspan><tspan fill="#f472b6">&quot;Get started — it’s free&quot;</tspan><tspan fill="#e7d8c9">.</tspan></tspan>
<tspan x="22" y="179"><tspan fill="#d97757">• </tspan><tspan fill="#e7d8c9">Leave behavior and styling untouched.</tspan></tspan>
<tspan x="22" y="198"> </tspan>
<tspan x="22" y="217"><tspan fill="#2dd4bf" font-weight="700">skip-comments: </tspan><tspan fill="#e7d8c9" opacity="0.62">the quoted string is preserved verbatim</tspan></tspan>
<tspan x="22" y="236"><tspan fill="#e7d8c9" opacity="0.62">— em dash, curly apostrophe and all.</tspan></tspan>
</text></g></svg>
