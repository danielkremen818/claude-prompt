<svg xmlns="http://www.w3.org/2000/svg" width="540" height="334" viewBox="0 0 540 334" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" role="img" aria-label="claude-prompt terminal: claude — /p prompt optimizer">
