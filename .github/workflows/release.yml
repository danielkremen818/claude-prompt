name: Release

# claude-prompt is distributed as a Claude Code plugin (installed from this repo
# via the marketplace), not an npm package — so a release is simply a validated,
# tagged GitHub Release. Users get the new version on their next `/plugin` update.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate plugin before releasing
        run: bash scripts/validate-plugin.sh

      - name: Tag matches manifest version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(jq -r '.version' .claude-plugin/plugin.json)"
          [ "$tag" = "$ver" ] || { echo "tag v$tag != plugin.json version $ver" >&2; exit 1; }

      - name: GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
