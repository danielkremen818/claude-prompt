name: Feature request
description: Suggest an enhancement for prompt-optimizer
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        prompt-optimizer is intentionally small — one command that rewrites a request,
        then runs it. Requests that keep it focused are most likely to land.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the current `/p` makes hard or impossible?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like `/p` (or a new command) to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, prompt patterns, or tools you've tried.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This keeps the plugin focused on prompt optimization (not a general-purpose toolkit).
          required: true
